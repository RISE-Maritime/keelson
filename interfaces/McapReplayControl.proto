syntax = "proto3";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

// RPC interface for controlling an MCAP replay instance from an external
// application: list files, load, play/pause/stop, seek, change speed, toggle
// looping. The same playback state is also broadcast as the keelson.ReplayStatus
// pub/sub payload so subscribers can monitor progress without polling.
//
// NOTE: this interface defines the contract only. The mcap-replay connector
// must still implement the server side; until then, no service is guaranteed
// to be reachable.

// -----------------------------------------------------------------------------
// Replay status (RPC-local; mirrors keelson.ReplayStatus with channel detail)
// -----------------------------------------------------------------------------

// Identifies the replay daemon. Mirrors keelson.DaemonInfo on the broadcast
// payload — declared inline here so the McapReplayControl interface stays
// self-contained.
message DaemonInfo {
  string version = 1;
  string hostname = 2;
  google.protobuf.Timestamp started_at = 3;
  string base_directory = 4;
}

message ReplayStatus {

  enum State {
    STOPPED = 0;
    PLAYING = 1;
    PAUSED = 2;
    LOADING = 3;
  }

  State state = 1;

  google.protobuf.Timestamp current_time = 2;
  google.protobuf.Timestamp start_time = 3;
  google.protobuf.Timestamp end_time = 4;

  float playback_speed = 5;
  string loaded_file = 6;

  uint32 channel_count = 7;
  uint64 total_message_count = 8;
  uint64 played_message_count = 9;

  float progress_pct = 10;
  bool loop = 11;

  DaemonInfo daemon = 20;

  // Active A-B segment if set; absent fields mean no segment is active.
  google.protobuf.Timestamp segment_start = 21;
  google.protobuf.Timestamp segment_end = 22;

  // Channel allowlist currently in effect. Empty means no filter (all on).
  repeated string filtered_channels = 23;

  // Progress of an in-flight load_file, 0..100. Zero outside of LOADING.
  float load_progress_pct = 24;

  // Most-recent load_file failure, surfaced through the broadcast because
  // the RPC reply has already returned OK by the time the worker fails.
  // Cleared on a successful load. Empty if the most recent load succeeded.
  string last_load_error = 25;
}

// -----------------------------------------------------------------------------
// File listing
// -----------------------------------------------------------------------------

message FileInfo {
  string path = 1;
  uint64 size_bytes = 2;
  uint64 message_count = 3;
  uint32 channel_count = 4;
  google.protobuf.Timestamp start_time = 5;
  google.protobuf.Timestamp end_time = 6;
  repeated string channel_names = 7;
}

message ListFilesRequest {
  // Optional glob pattern (default "*.mcap").
  string pattern = 1;
}

message ListFilesResponse {
  // Base directory the files are listed from.
  string base_directory = 1;
  repeated FileInfo files = 2;
}

// -----------------------------------------------------------------------------
// Control requests
// -----------------------------------------------------------------------------

message LoadFileRequest {
  string path = 1;
}

message SeekRequest {
  // Target playhead timestamp. Must fall within the loaded file's window.
  google.protobuf.Timestamp target = 1;
}

message SetSpeedRequest {
  // Playback speed multiplier; expected range [0.25, 4.0].
  float speed = 1;
}

message SetLoopRequest {
  bool loop = 1;
}

message StepRequest {
  // Number of messages to emit then pause. Zero is treated as 1.
  // Honors the channel filter (if any): filtered-out messages still count
  // toward the step budget so progress is monotonic across the file.
  uint32 count = 1;
}

message SetSegmentRequest {
  // Both inclusive. Setting both to their zero/unset value clears the
  // segment and playback returns to whole-file behaviour.
  google.protobuf.Timestamp start = 1;
  google.protobuf.Timestamp end = 2;
}

message SetChannelFilterRequest {
  // If empty, every channel is emitted (default). If non-empty, only the
  // listed channel topics are emitted; the rest are silently dropped.
  // Filtered-out messages still count toward played_message_count so the
  // progress bar moves linearly with the file, not with what's emitted.
  repeated string channels = 1;
}

// Generic acknowledgement for control commands.
message McapReplaySuccessResponse {}

// -----------------------------------------------------------------------------
// Service
// -----------------------------------------------------------------------------

service McapReplayControl {
  rpc get_status(google.protobuf.Empty) returns (ReplayStatus);

  rpc list_files(ListFilesRequest) returns (ListFilesResponse);
  rpc load_file(LoadFileRequest) returns (McapReplaySuccessResponse);

  rpc play(google.protobuf.Empty) returns (McapReplaySuccessResponse);
  rpc pause(google.protobuf.Empty) returns (McapReplaySuccessResponse);
  rpc stop(google.protobuf.Empty) returns (McapReplaySuccessResponse);

  rpc seek(SeekRequest) returns (McapReplaySuccessResponse);
  rpc set_speed(SetSpeedRequest) returns (McapReplaySuccessResponse);
  rpc set_loop(SetLoopRequest) returns (McapReplaySuccessResponse);

  rpc step(StepRequest) returns (McapReplaySuccessResponse);
  rpc set_segment(SetSegmentRequest) returns (McapReplaySuccessResponse);
  rpc set_channel_filter(SetChannelFilterRequest) returns (McapReplaySuccessResponse);
}
