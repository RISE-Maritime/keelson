syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "VehicleCommon.proto";

// Lifecycle operations on a vehicle's onboard control compute: arm /
// disarm, mode change, emergency stop, parameter persistence, reboot.
// Vehicle-agnostic where possible. Transport-level RPC failures (no
// connection, malformed request, etc.) still surface as ErrorResponse
// on the RPC error channel; autopilot-level outcomes are encoded in
// each Response's CommandResult field instead.

// Arm or disarm the vehicle. ArduPilot semantics: arming clears motor
// safeties; disarming forces motor outputs to neutral. Maps onto MAVLink
// MAV_CMD_COMPONENT_ARM_DISARM.
message ArmRequest {
  google.protobuf.Timestamp timestamp = 1;
  bool arm = 2;  // true = arm, false = disarm
}

message ArmResponse {
  CommandResult result = 1;
  int32 raw_autopilot_result = 2;
  string detail = 3;
}

// Change the vehicle's operating mode. The mode name is interpreted by
// the connector (ArduPilot accepts both symbolic names like "MANUAL",
// "GUIDED", "AUTO" and numeric custom-mode ids). Maps onto MAVLink
// MAV_CMD_DO_SET_MODE (COMMAND_LONG path -- gives us a COMMAND_ACK).
message SetModeRequest {
  google.protobuf.Timestamp timestamp = 1;
  string mode = 2;
}

message SetModeResponse {
  CommandResult result = 1;
  int32 raw_autopilot_result = 2;
  string detail = 3;
  // Mode the autopilot reports as active after the call, polled from
  // HEARTBEAT briefly post-ACK. Empty if not observed within the wait
  // window (HEARTBEAT typically arrives at 1 Hz).
  string mode_actual = 4;
}

// Trigger emergency stop -- forces motor outputs off and disarms. Calling
// this RPC at all is the signal; there is no "stop=false". Maps onto
// MAVLink MAV_CMD_DO_FLIGHTTERMINATION.
message EmergencyStopRequest {
  google.protobuf.Timestamp timestamp = 1;
}

message EmergencyStopResponse {
  CommandResult result = 1;
  int32 raw_autopilot_result = 2;
  string detail = 3;
}

// Persist the current in-memory parameter set to non-volatile storage
// (EEPROM on ArduPilot). Without this, set_param writes are lost across
// reboots. Maps onto MAVLink MAV_CMD_PREFLIGHT_STORAGE.
message SaveParamsRequest {
  google.protobuf.Timestamp timestamp = 1;
}

message SaveParamsResponse {
  CommandResult result = 1;
  int32 raw_autopilot_result = 2;
  string detail = 3;
}

// Reboot, shutdown, or re-enter bootloader on a vehicle's onboard compute.
// Affects the vehicle's control compute (autopilot, ROV stack, etc.), not
// the connector process or any shoreside infrastructure.
message RebootRequest {
  google.protobuf.Timestamp timestamp = 1;

  enum Action {
    UNSPECIFIED = 0;
    REBOOT = 1;
    SHUTDOWN = 2;
    REBOOT_TO_BOOTLOADER = 3;
  }
  Action action = 2;
}

// The autopilot usually drops the link as part of the reboot before the
// COMMAND_ACK arrives, so TIMEOUT is the common-case result and is not
// itself an indication of failure. Reconnection telemetry is the real
// signal of success.
message RebootResponse {
  CommandResult result = 1;
  int32 raw_autopilot_result = 2;
  string detail = 3;
}

service VehicleLifecycle {
  rpc arm(ArmRequest) returns (ArmResponse);
  rpc set_mode(SetModeRequest) returns (SetModeResponse);
  rpc emergency_stop(EmergencyStopRequest) returns (EmergencyStopResponse);
  rpc save_params(SaveParamsRequest) returns (SaveParamsResponse);
  rpc reboot(RebootRequest) returns (RebootResponse);
}
