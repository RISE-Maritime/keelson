syntax = "proto3";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "VehicleCommon.proto";

// RPC interface for reading, writing, and persisting a vehicle's
// onboard control parameters. Vehicle-agnostic by intent; mavlink-style
// mav_param_type echoes are surfaced unchanged.

message ParamGetRequest {
  string name = 1;
}

message ParamSetRequest {
  string name = 1;
  float value = 2;
}

// Post-write echo of a parameter as the autopilot now reports it.
// `mav_param_type` is the underlying MAV_PARAM_TYPE enum (e.g. 9 = REAL32)
// so callers can detect type coercions performed by the autopilot.
message ParamValueResponse {
  string name = 1;
  float value = 2;
  int32 mav_param_type = 3;
}

message ParamListResponse {
  repeated ParamValueResponse params = 1;
}

message ParamSetBulkRequest {
  repeated ParamSetRequest params = 1;
}

message ParamSetBulkResult {
  string name = 1;
  bool ok = 2;
  // Populated only when ok=false.
  string error = 3;
  // Echoed value on success.
  float value = 4;
  int32 mav_param_type = 5;
}

message ParamSetBulkResponse {
  repeated ParamSetBulkResult results = 1;
}

// Persist the current in-memory parameter set to non-volatile storage.
// Maps onto MAVLink MAV_CMD_PREFLIGHT_STORAGE.
//
// No-op on ArduPilot: ArduPilot persists every set_param write to
// storage immediately, so this bulk command is redundant and the
// autopilot returns DENIED -- an expected outcome, not a failure. The
// RPC is meaningful for PX4-class autopilots, which do not auto-persist.
message SaveParamsRequest {
  google.protobuf.Timestamp timestamp = 1;
}

message SaveParamsResponse {
  CommandResult result = 1;
  int32 raw_autopilot_result = 2;
  string detail = 3;
}

service VehicleParam {
  rpc get_param(ParamGetRequest) returns (ParamValueResponse);
  rpc set_param(ParamSetRequest) returns (ParamValueResponse);
  rpc list_params(google.protobuf.Empty) returns (ParamListResponse);
  rpc set_params(ParamSetBulkRequest) returns (ParamSetBulkResponse);
  rpc save_params(SaveParamsRequest) returns (SaveParamsResponse);
}
