syntax = "proto3";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "VehicleCommon.proto";

// RPC interface for managing a vehicle's onboard mission. Vehicle-agnostic
// by intent; the wire shape of MissionItem mirrors MAVLink
// MISSION_ITEM_INT for the mavlink2keelson connector but the same model
// fits any waypoint-driven autopilot.

// One mission item. Fields map 1:1 onto MAVLink MISSION_ITEM_INT.
message MissionItem {
  uint32 seq = 1;
  // MAV_FRAME enum (e.g. 0=GLOBAL, 3=GLOBAL_RELATIVE_ALT, 6=GLOBAL_RELATIVE_ALT_INT).
  uint32 frame = 2;
  // MAV_CMD enum (e.g. 16=NAV_WAYPOINT, 21=NAV_LAND, 22=NAV_TAKEOFF).
  uint32 command = 3;
  bool current = 4;
  bool autocontinue = 5;
  float param1 = 6;
  float param2 = 7;
  float param3 = 8;
  float param4 = 9;
  // Latitude (degE7) or local X. ArduPilot expects 1e-7 degrees.
  sint32 x = 10;
  // Longitude (degE7) or local Y.
  sint32 y = 11;
  // Altitude in meters (semantics depend on `frame`).
  float z = 12;
  // MAV_MISSION_TYPE: 0=mission, 1=fence, 2=rally. Connector overrides for
  // uploads -- provided here for callers that interleave types in one Mission.
  uint32 mission_type = 13;
}

message Mission {
  repeated MissionItem items = 1;
}

// Autopilot returns MAV_MISSION_RESULT (not MAV_RESULT) for mission
// uploads. The connector maps MAV_MISSION_RESULT values into
// CommandResult (NO_SPACE/INVALID_*/UNSUPPORTED_FRAME etc. fold into
// FAILED/DENIED/UNSUPPORTED as appropriate) and preserves the raw code
// in raw_autopilot_result so callers can disambiguate.
message MissionUploadResponse {
  CommandResult result = 1;
  int32 raw_autopilot_result = 2;
  string detail = 3;
}

// Clear all mission items from the autopilot. Maps onto MAVLink
// MISSION_CLEAR_ALL. Calling this RPC at all is the signal; there is no
// "clear=false".
message ClearMissionRequest {
  google.protobuf.Timestamp timestamp = 1;
}

message ClearMissionResponse {
  CommandResult result = 1;
  int32 raw_autopilot_result = 2;
  string detail = 3;
}

// Jump to a specific waypoint in the uploaded mission. Maps onto MAVLink
// MISSION_SET_CURRENT. The autopilot does not COMMAND_ACK this; the
// connector observes the next MISSION_CURRENT and reports the seq it
// reports as actually current.
message SetCurrentWaypointRequest {
  google.protobuf.Timestamp timestamp = 1;
  uint32 seq = 2;
}

message SetCurrentWaypointResponse {
  CommandResult result = 1;
  int32 raw_autopilot_result = 2;
  string detail = 3;
  // The seq the autopilot reports as current after the call, polled
  // from MISSION_CURRENT. 0 if not observed within the wait window.
  uint32 seq_actual = 4;
}

service VehicleMission {
  rpc upload_mission(Mission) returns (MissionUploadResponse);
  rpc download_mission(google.protobuf.Empty) returns (Mission);
  rpc clear_mission(ClearMissionRequest) returns (ClearMissionResponse);
  rpc set_current_waypoint(SetCurrentWaypointRequest) returns (SetCurrentWaypointResponse);
}
