syntax = "proto3";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "VehicleCommon.proto";

// RPC interface for managing a vehicle's onboard mission: a pre-loaded
// sequence of go-to-and-do steps the autopilot executes autonomously
// (AUTO mode in MAVLink terms). Vehicle-agnostic by intent — each
// MissionItem's `step` is one of a closed set of typed actions, not
// an opaque (command, param1..param4) tuple.

// One step in a mission. The `step` oneof picks the action; fields
// that don't apply to the chosen step are simply absent (no opaque
// `param1..4` carrying overloaded meanings).
//
// Sequence position is the index in Mission.items — there is no
// separate `seq` field. Connectors that need wire-level sequence
// numbers (e.g. MAVLink MISSION_ITEM_INT) synthesise them from the
// list index on upload.
message MissionItem {
  bool autocontinue = 1;

  oneof step {
    Waypoint    waypoint     = 2;
    Loiter      loiter       = 3;
    Delay       delay        = 4;
    ReturnHome  return_home  = 5;
    ChangeSpeed change_speed = 6;
    SetHome     set_home     = 7;
  }
}

message Mission {
  repeated MissionItem items = 1;
}

// Drive to a position and (optionally) hold for a fixed duration before
// proceeding. `altitude_m` is interpreted per the connector's vehicle
// type (surface vessels typically use 0). `acceptance_radius_m = 0`
// means "use the autopilot's default".
message Waypoint {
  Coordinate position = 1;
  double altitude_m = 2;
  double acceptance_radius_m = 3;
  // Hold at the waypoint for this many seconds before advancing.
  // 0 = pass straight through.
  double hold_time_s = 4;
}

// Orbit a position. Termination picks how the loiter ends.
message Loiter {
  Coordinate position = 1;
  double altitude_m = 2;
  double radius_m = 3;

  oneof termination {
    google.protobuf.Empty unlimited = 4;  // loiter forever
    uint32 turns = 5;                     // loiter for N complete orbits
    double duration_s = 6;                // loiter for this many seconds
  }
}

// Wait in place for a fixed duration before advancing.
message Delay {
  double duration_s = 1;
}

// Return to the launch / home position.
message ReturnHome {}

// Change the cruise speed used by subsequent waypoints.
message ChangeSpeed {
  double speed_mps = 1;
}

// Update the vehicle's home position to a specific coordinate.
message SetHome {
  Coordinate position = 1;
  double altitude_m = 2;
}

// Autopilot returns MAV_MISSION_RESULT (not MAV_RESULT) for mission
// uploads. The connector maps MAV_MISSION_RESULT values into
// CommandResult (NO_SPACE/INVALID_*/UNSUPPORTED_FRAME etc. fold into
// FAILED/DENIED/UNSUPPORTED as appropriate) and preserves the raw code
// in raw_autopilot_result so callers can disambiguate.
message MissionUploadResponse {
  CommandResult result = 1;
  int32 raw_autopilot_result = 2;
  string detail = 3;
}

// Clear all mission items from the autopilot. Maps onto MAVLink
// MISSION_CLEAR_ALL. Calling this RPC at all is the signal; there is no
// "clear=false".
message ClearMissionRequest {
  google.protobuf.Timestamp timestamp = 1;
}

message ClearMissionResponse {
  CommandResult result = 1;
  int32 raw_autopilot_result = 2;
  string detail = 3;
}

// Jump to a specific waypoint in the uploaded mission. Maps onto MAVLink
// MISSION_SET_CURRENT. The autopilot does not COMMAND_ACK this; the
// connector observes the next MISSION_CURRENT and reports the seq it
// reports as actually current.
message SetCurrentWaypointRequest {
  google.protobuf.Timestamp timestamp = 1;
  uint32 seq = 2;
}

message SetCurrentWaypointResponse {
  CommandResult result = 1;
  int32 raw_autopilot_result = 2;
  string detail = 3;
  // The seq the autopilot reports as current after the call, polled
  // from MISSION_CURRENT. 0 if not observed within the wait window.
  uint32 seq_actual = 4;
}

service VehicleMission {
  rpc upload_mission(Mission) returns (MissionUploadResponse);
  rpc download_mission(google.protobuf.Empty) returns (Mission);
  rpc clear_mission(ClearMissionRequest) returns (ClearMissionResponse);
  rpc set_current_waypoint(SetCurrentWaypointRequest) returns (SetCurrentWaypointResponse);
}
