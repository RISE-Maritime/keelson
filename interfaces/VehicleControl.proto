syntax = "proto3";

import "google/protobuf/empty.proto";

// Configuration interface for the live, high-rate "drive the vehicle"
// data path. Same architectural shape as the file-driven sensor
// injection: this interface configures *which existing Keelson subjects
// the connector should subscribe to* per control axis, then the
// connector assembles one MAVLink RC override per arrival.
//
// The data itself flows on existing controller-input subjects
// (joystick_x_pct, joystick_y_pct, dpad_*_pct, wheel_position_pct,
// lever_position_pct, joystick_lt_pct, joystick_rt_pct — see
// subjects.yaml). The connector does not invent a new payload type for
// stick-driving.

message ManualControlAxis {
  // Entity to subscribe under. Empty string => connector's own
  // --entity-id (the typical case: a companion-board joystick driver
  // publishing under the same vehicle's namespace).
  string entity_id = 1;

  // Keelson subject to subscribe to. Must be a TimestampedFloat-valued
  // subject. Common picks: joystick_x_pct (steering), joystick_y_pct
  // (throttle), wheel_position_pct (helm wheel), lever_position_pct
  // (engine telegraph), joystick_rt_pct (right-trigger as accelerator).
  string subject = 2;

  // Source-id glob pattern within the entity.
  string source_id = 3;

  // Source range hint. False (default) = bipolar source in [-100, 100],
  // 0 = neutral; we map to [-1.0, 1.0] by dividing by 100. True =
  // unipolar source in [0, 100] (e.g. joystick_rt_pct, a trigger);
  // we map raw=0 to 0.0 (neutral) and raw=100 to +1.0 (full forward).
  // Reverse is not reachable through a unipolar source; use a bipolar
  // source if you need it.
  bool unipolar = 4;

  // Flip the sign after scaling. Useful when the producer's positive
  // direction is opposite the autopilot's (e.g. some sticks publish
  // positive Y for backward).
  bool invert = 5;
}

message ManualControlMapping {
  // -------------------------------------------------------------------
  // Contract for publishers feeding these axes
  // -------------------------------------------------------------------
  // Publishers MUST publish continuously (on a fixed cadence, NOT
  // on-change-only) for the entire duration the operator is holding
  // the override — including when stick position isn't changing.
  // Recommended rate: 10-20 Hz.
  //
  // This is load-bearing: the connector is sample-driven (one MAVLink
  // RC_CHANNELS_OVERRIDE per arriving Zenoh sample), and ArduPilot
  // times the override out after ~3 s of no frames. Silence on the
  // Zenoh wire is the stop signal — so an on-change-only publisher
  // looks identical to "operator's network died" once the operator
  // stops moving the sticks. Make sure your upstream emits whether
  // or not the value changed.
  // -------------------------------------------------------------------
  //
  // Per-axis subject mapping. v1 (ArduPilot Rover frame) recognizes
  // only "steering" and "throttle" — they resolve to the autopilot's
  // RCMAP_ROLL and RCMAP_THROTTLE RC channels respectively, via the
  // existing channel autodetect. Unknown axis names cause the RPC to
  // reply with ErrorResponse listing the allowed values.
  //
  // Future Plane / Copter support would add "roll", "pitch", "yaw".
  // Unmapped axes default to neutral PWM (1500us) in the emitted
  // RC_CHANNELS_OVERRIDE — useful for layered manual+auto control
  // ("autonomy steers, joystick controls throttle").
  map<string, ManualControlAxis> axes = 1;

  // Minimum interval between RC_OVERRIDE emissions, in seconds.
  // 0 (default) = emit on every axis arrival. With both axes updating
  // at the same producer cadence this doubles the wire rate; setting
  // min_interval_s to e.g. 0.05 caps the output at 20 Hz.
  float min_interval_s = 2;

  // Dead-man: if any mapped axis's last sample is older than this
  // (in seconds, wall clock) the connector stops emitting
  // RC_CHANNELS_OVERRIDE, letting ArduPilot's own RC override timer
  // expire and return control to the autopilot mode. This is what
  // catches a Zenoh-side dropout — without it, the override would
  // survive a network split indefinitely.
  //
  // 0 (unset) = use the connector default of 1.0 s, which assumes
  // upstreams publish at >= 10 Hz (lots of headroom for jitter). Set
  // explicitly to tighten or loosen; values above ArduPilot's
  // RC_OVERRIDE_TIME (~3 s default) are pointless because ArduPilot
  // would time out first. The dead-man cannot be disabled by design.
  float max_axis_age_s = 3;
}

message ManualControlMappingAck {}

service VehicleControl {
  // Replace the active manual-control mapping atomically. An empty
  // axes map = stop driving (undeclare every axis subscriber). Calling
  // this RPC is the only way to make the vehicle drivable after a
  // connector start.
  rpc set_manual_control_mapping(ManualControlMapping)
      returns (ManualControlMappingAck);

  // Return the currently-active mapping. Useful for operators
  // inspecting state set by another client.
  rpc get_manual_control_mapping(google.protobuf.Empty)
      returns (ManualControlMapping);
}
