syntax = "proto3";

import "google/protobuf/empty.proto";

// Configuration interface for the live, high-rate "drive the vehicle"
// data path. Vehicle connectors carry the actual stick / throttle stream
// on the existing `manual_control` pub/sub subject (typed
// `keelson.ManualControl`); this interface only configures *which* Zenoh
// keys the connector subscribes to for that stream.
//
// Same architectural shape as the file-driven injection mapping: pub/sub
// for the high-rate data, RPC for the (lower-rate) configuration of
// which sources feed it. Defaults can also be set via the connector's
// --manual-control-source CLI flag.

message ManualControlSource {
  // Entity to subscribe under. Empty string => connector's own
  // --entity-id (the common case: a companion-board joystick driver
  // publishing under the same vehicle's namespace).
  string entity_id = 1;
  // Source-id glob pattern within the entity (e.g. "joystick-1",
  // "joystick-*/0", or "**" for "any source").
  string source_id = 2;
}

message ManualControlSources {
  // Empty list = stop accepting manual_control entirely (undeclare all
  // current subscribers). Multiple entries = OR; any publisher matching
  // any source drives the vehicle, FIFO at the connector's command queue.
  repeated ManualControlSource sources = 1;
}

message ManualControlSourcesAck {}

service VehicleControl {
  // Replace the current set of manual_control subscriptions with the
  // given list. Atomic from the caller's perspective: old subscribers
  // are undeclared and new ones declared in one handler invocation.
  rpc set_manual_control_sources(ManualControlSources)
      returns (ManualControlSourcesAck);

  // Return the currently-active subscription list. Useful for operators
  // to inspect state set by a previous client or by the connector's
  // --manual-control-source CLI default.
  rpc get_manual_control_sources(google.protobuf.Empty)
      returns (ManualControlSources);
}
