syntax = "proto3";

// Catch-all RPC interface for one-off MAVLink commands that don't have
// their own Keelson subject yet.

message SetMessageIntervalRequest {
  // Either the symbolic MAVLink message name (e.g. "ATTITUDE") OR the
  // numeric MAVLink message id. If `message_id` is non-zero it wins.
  string message_name = 1;
  uint32 message_id = 2;
  // Desired publication rate in Hz. 0 = stop publishing the message.
  float hz = 3;
}

message SetMessageIntervalResponse {
  bool accepted = 1;
  // MAV_RESULT enum (0=ACCEPTED, 1=TEMPORARILY_REJECTED, 2=DENIED, ...).
  int32 mav_result = 2;
}

// Escape hatch: send an arbitrary MAVLink COMMAND_LONG. Use when a
// MAV_CMD_* operation doesn't have a typed subject yet.
message CommandLongRequest {
  uint32 command = 1;        // MAV_CMD enum
  float param1 = 2;
  float param2 = 3;
  float param3 = 4;
  float param4 = 5;
  float param5 = 6;
  float param6 = 7;
  float param7 = 8;
  // Optional override of the target component (default = connector's
  // configured --target-component).
  optional uint32 target_component = 9;
}

message CommandLongResponse {
  // MAV_RESULT enum from the autopilot's COMMAND_ACK.
  int32 mav_result = 1;
  string text = 2;
}

service MavlinkCommand {
  rpc set_message_interval(SetMessageIntervalRequest)
      returns (SetMessageIntervalResponse);
  rpc send_command_long(CommandLongRequest) returns (CommandLongResponse);
}
