syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "VehicleCommon.proto";

// A single position target for a vehicle in a guided / navigation mode.
// Vehicle-agnostic: maps onto MAVLink SET_POSITION_TARGET_GLOBAL_INT for
// the mavlink2keelson connector, but the same interface fits any vehicle
// connector that accepts a WGS84 position target.
message NavigationTarget {
  google.protobuf.Timestamp timestamp = 1;

  // WGS84 latitude / longitude in degrees.
  double latitude = 2;
  double longitude = 3;

  // Altitude above mean sea level in meters. Omit for surface vehicles
  // that operate at sea level by definition.
  optional float altitude_msl_m = 4;

  // Desired cruise speed for the leg in meters per second. Omit to let
  // the vehicle use its configured default.
  optional float ground_speed_mps = 5;

  // Target heading at arrival, degrees clockwise from true north. Omit
  // to let the vehicle pick its own arrival heading.
  optional float yaw_deg = 6;
}

// SET_POSITION_TARGET_GLOBAL_INT has no MAVLink-level acknowledgement
// (https://mavlink.io/en/messages/common.html); ArduPilot silently
// drops invalid targets (e.g. geofence violations) without a NAK or
// STATUSTEXT. The connector therefore briefly polls
// POSITION_TARGET_GLOBAL_INT after sending: if the autopilot's
// commanded target matches what we sent within a small tolerance,
// the result is ACCEPTED; otherwise NOT_OBSERVABLE (we cannot tell
// "silently rejected" from "stream wasn't running"). When
// `ground_speed_mps` is set the optional MAV_CMD_DO_CHANGE_SPEED
// COMMAND_ACK is folded into `detail`.
message NavigationTargetResponse {
  CommandResult result = 1;
  int32 raw_autopilot_result = 2;
  string detail = 3;
}

// Set the vehicle's cruise (leg) speed in meters per second. Applied to
// the active waypoint / GUIDED-mode navigation. Maps onto MAVLink
// MAV_CMD_DO_CHANGE_SPEED for the mavlink2keelson connector.
message SetCruiseSpeedRequest {
  google.protobuf.Timestamp timestamp = 1;
  float speed_mps = 2;
}

message SetCruiseSpeedResponse {
  CommandResult result = 1;
  int32 raw_autopilot_result = 2;
  string detail = 3;
}

service VehicleNavigation {
  // Commission the vehicle to navigate to a single target. Caller is
  // responsible for ensuring the vehicle is in an appropriate mode first
  // (e.g. GUIDED for ArduPilot Rover).
  rpc set_navigation_target(NavigationTarget) returns (NavigationTargetResponse);

  // Change cruise (leg) speed for the active navigation.
  rpc set_cruise_speed(SetCruiseSpeedRequest) returns (SetCruiseSpeedResponse);
}
