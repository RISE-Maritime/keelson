# Keelson Hand Controller connector — both controllers, no profiles
#
# Same as docker-compose.hc.yml but without `profiles:` gates, so a plain
# `up` starts both the SSROV and Logitech connectors at once.
#
# Quick start:
#   1. Start the host-side relays (one terminal per controller):
#        SSROV:    uv run bin/hid_relay.py --port 9090
#        Logitech: uv run bin/hid_relay.py --no-mfi --port 9091   # --no-mfi only on macOS
#   2. Bring up both connectors:
#        docker compose -f docker-compose.hc.all.yml up
#
# To tweak: edit `command:` below — change --realm (-r), --entity-id (-e), log level,
# or relay port. For a non-default Zenoh router, append e.g.
#   --mode client --connect tcp/localhost:7447

x-hc-base: &hc-base
  build: .
  restart: unless-stopped
  network_mode: "host"
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  ssrov:
    <<: *hc-base
    container_name: keelson-connector-ssrov
    command: ["hc2keelson --log-level 20 -r rise -e ssrs18 --controller ssrov --axis-center-snap-pct 1.0 --relay host.docker.internal:9090"]

  logitech:
    <<: *hc-base
    container_name: keelson-connector-logitech
    command: ["hc2keelson --log-level 20 -r rise -e ssrs18 --controller logitech --axis-center-snap-pct 1.0 --relay host.docker.internal:9091"]


