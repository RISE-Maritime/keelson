syntax = "proto3";

import "google/protobuf/timestamp.proto";

package keelson;

// Normalized vehicle motion command. Each axis is unitless in [-1.0, 1.0];
// downstream connectors translate to vehicle-specific units (e.g. MAVLink
// MANUAL_CONTROL int16 [-1000, 1000], or thruster PWM).
message ManualControl {
  google.protobuf.Timestamp timestamp = 1;
  float steering = 2;  // -1.0 (full left) .. 1.0 (full right)
  float throttle = 3;  // -1.0 (full reverse) .. 1.0 (full forward)
}
