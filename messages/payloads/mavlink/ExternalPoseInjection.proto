syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "foxglove/Quaternion.proto";

package mavlink;

// External pose estimate (position + orientation) injected into an
// autopilot's nav stack. Maps onto MAVLink VISION_POSITION_ESTIMATE.
// Position is in the autopilot's local NED frame in meters.
message ExternalPoseInjection {
  google.protobuf.Timestamp timestamp = 1;

  float x_m = 2;                      // local frame X (north)
  float y_m = 3;                      // local frame Y (east)
  float z_m = 4;                      // local frame Z (down)

  // Optional orientation; if unset, only the position fields are used.
  optional foxglove.Quaternion orientation = 5;

  // Optional row-major upper-triangular 6x6 covariance for (x, y, z, roll,
  // pitch, yaw). 21 entries. Empty = autopilot uses its own defaults.
  repeated float covariance = 6;
}
