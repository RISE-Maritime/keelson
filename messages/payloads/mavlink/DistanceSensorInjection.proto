syntax = "proto3";

import "google/protobuf/timestamp.proto";

package mavlink;

// Single-axis distance measurement (depth sounder, LIDAR, ultrasonic, etc.)
// injected into an autopilot. Maps onto MAVLink DISTANCE_SENSOR.
message DistanceSensorInjection {
  google.protobuf.Timestamp timestamp = 1;

  // Measured distance in meters.
  float current_distance_m = 2;
  float min_distance_m = 3;
  float max_distance_m = 4;

  // MAV_DISTANCE_SENSOR enum: 0=LASER, 1=ULTRASOUND, 2=INFRARED, 3=RADAR,
  // 4=UNKNOWN.
  uint32 sensor_type = 5;

  // Sensor identifier (0..255). Multiple sensors of the same orientation
  // are distinguished by id.
  uint32 sensor_id = 6;

  // MAV_SENSOR_ORIENTATION: 0=forward, 24=facing-up, 25=facing-down, etc.
  uint32 orientation = 7;

  // Optional signal quality in [0, 100]; 0 = unknown.
  optional uint32 signal_quality_pct = 8;
}
