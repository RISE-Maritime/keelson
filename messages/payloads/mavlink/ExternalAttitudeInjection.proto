syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "foxglove/Quaternion.proto";

package mavlink;

// External attitude (orientation only) injected into an autopilot's nav
// stack. Maps onto MAVLink ATT_POS_MOCAP — typically used to feed an
// RTK-derived heading or a motion-capture orientation.
message ExternalAttitudeInjection {
  google.protobuf.Timestamp timestamp = 1;

  foxglove.Quaternion orientation = 2;

  // Optional row-major upper-triangular 3x3 covariance for (roll, pitch,
  // yaw). 6 entries. Empty = autopilot uses its own defaults.
  repeated float covariance = 3;
}
