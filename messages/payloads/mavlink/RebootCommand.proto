syntax = "proto3";

import "google/protobuf/timestamp.proto";

package mavlink;

// Reboot / shutdown / re-enter-bootloader command for an autopilot.
// Maps onto MAVLink MAV_CMD_PREFLIGHT_REBOOT_SHUTDOWN.
//
// The action enum is explicit on the wire so callers cannot accidentally
// shut a vehicle down when they meant to reboot it.
message RebootCommand {
  google.protobuf.Timestamp timestamp = 1;

  enum Action {
    UNSPECIFIED = 0;
    REBOOT = 1;
    SHUTDOWN = 2;
    REBOOT_TO_BOOTLOADER = 3;
  }
  Action action = 2;
}
