syntax = "proto3";

import "google/protobuf/timestamp.proto";

package keelson;

// Periodic broadcast of MCAP replay state, intended for pub/sub subscribers
// that want to monitor playback progress without polling the McapReplayControl
// RPC interface. Mirrors the shape of the RPC ReplayStatus response minus
// channel-count detail.

message ReplayStatus {

  enum State {
    STOPPED = 0;
    PLAYING = 1;
    PAUSED = 2;
    LOADING = 3;
  }

  State state = 1;

  // Current playhead position in the loaded file.
  google.protobuf.Timestamp current_time = 2;

  // Start and end timestamps of the loaded file.
  google.protobuf.Timestamp start_time = 3;
  google.protobuf.Timestamp end_time = 4;

  // Playback speed multiplier (1.0 = real time).
  float playback_speed = 5;

  // Path of the currently loaded MCAP file, or empty if none loaded.
  string loaded_file = 6;

  // Number of messages already emitted since the file was loaded.
  uint64 played_message_count = 7;

  // Total number of messages in the loaded file.
  uint64 total_message_count = 8;

  // Progress through the file as a percentage in [0.0, 100.0].
  float progress_pct = 9;

  // Whether the replayer is configured to loop on end-of-file.
  bool loop = 10;
}
