# PASHR - RT300 proprietary roll and pitch sentence accuracy estimates
roll_accuracy_deg:                      keelson.TimestampedFloat # 1-sigma roll accuracy estimate
pitch_accuracy_deg:                     keelson.TimestampedFloat # 1-sigma pitch accuracy estimate  
heading_accuracy_deg:                   keelson.TimestampedFloat # 1-sigma heading accuracy estimate

# PASHR - RT300 proprietary status indicators
gnss_aiding_status:                     keelson.TimestampedInt   # 0=GPS only, 1=GPS+inertial
imu_system_status:                      keelson.TimestampedInt   # 0=good, non-zero=error codes

# Generic Controller Inputs
# The source_id encodes both the controller identity and the specific input.
# Convention: <controller_id>/<input_name>
# Example key expressions:
#   rise/@v0/rov/pubsub/button_state_change/gamepad_hc/a       (gamepad A button)
#   rise/@v0/rov/pubsub/joystick_x_pct/gamepad_hc              (gamepad left stick X)
#   rise/@v0/rov/pubsub/button_state_change/rov_hc/arm         (hardware controller arm button)

# Buttons — source_id suffix is the button name (e.g. a, b, x, y, arm, disarm)
button_state_change:                     keelson.TimestampedInt   # Button pressed (1) or released (0)

# Joystick axes — values normalised to [-100.0, 100.0]; 0.0 at rest
joystick_x_pct:                          keelson.TimestampedFloat # Primary X axis (left–right); negative=left, positive=right
joystick_y_pct:                          keelson.TimestampedFloat # Primary Y axis (forward–back); negative=back, positive=forward
joystick_z_pct:                          keelson.TimestampedFloat # Z axis (throttle/heave); negative=down, positive=up
joystick_rx_pct:                         keelson.TimestampedFloat # Rotation X axis (roll); negative=port, positive=starboard
joystick_ry_pct:                         keelson.TimestampedFloat # Rotation Y axis (pitch); negative=nose-down, positive=nose-up
joystick_rz_pct:                         keelson.TimestampedFloat # Rotation Z axis (yaw/twist); negative=left, positive=right

# D-pad — discrete steps: -100.0, 0.0, +100.0
dpad_x_pct:                              keelson.TimestampedFloat # D-pad horizontal; -100.0=left, 0.0=center, +100.0=right
dpad_y_pct:                              keelson.TimestampedFloat # D-pad vertical;   -100.0=down, 0.0=center, +100.0=up

# Triggers — values normalised to [0.0, 100.0]; 0.0 = fully released
joystick_lt_pct:                         keelson.TimestampedFloat # Left trigger (analog or digital); 0.0=released, 100.0=fully pressed
joystick_rt_pct:                         keelson.TimestampedFloat # Right trigger (analog or digital); 0.0=released, 100.0=fully pressed

wheel_position_pct:                     keelson.TimestampedFloat
lever_position_pct:                     keelson.TimestampedFloat

altitude_above_msl_m:                   keelson.TimestampedFloat
climb_rate_mps:                         keelson.TimestampedFloat

# Vehicle commands / control
manual_control:                         keelson.ManualControl     # typed normalized motion command (steering, throttle in [-1.0, 1.0])
cmd_manual_control:                     keelson.TimestampedString # DEPRECATED, use manual_control. JSON: {"steering":N,"throttle":N} in [-1000, 1000]
cmd_arm:                                keelson.TimestampedBool   # true=arm, false=disarm
cmd_set_mode:                           keelson.TimestampedString # ArduPilot/PX4 mode name or number
cmd_active_source:                      keelson.TimestampedString # manual override of CommandMux active source
active_command_source:                  keelson.TimestampedString # which command source the mux is currently following
cmd_goto:                               mavlink.GoToCommand       # GUIDED-mode position target (SET_POSITION_TARGET_GLOBAL_INT)
cmd_set_cruise_speed:                   keelson.TimestampedFloat  # m/s; MAV_CMD_DO_CHANGE_SPEED
cmd_set_current_waypoint:               keelson.TimestampedInt    # mission seq to jump to; MISSION_SET_CURRENT
cmd_emergency_stop:                     keelson.TimestampedBool   # true triggers MAV_CMD_DO_FLIGHTTERMINATION
cmd_enable_geofence:                    keelson.TimestampedBool   # MAV_CMD_DO_FENCE_ENABLE
cmd_clear_mission:                      keelson.TimestampedBool   # true clears uploaded mission (MISSION_CLEAR_ALL)
cmd_save_params:                        keelson.TimestampedBool   # true writes params to EEPROM (PREFLIGHT_STORAGE)
cmd_reboot:                             mavlink.RebootCommand     # reboot/shutdown/bootloader (PREFLIGHT_REBOOT_SHUTDOWN)

# Sensor injection (Keelson -> autopilot). Pair with autopilot config:
# GPS_TYPE=14 for GPS_INPUT, EK3_SRC*_VEL/POS=6 for vision-* messages.
inject_gps:                             mavlink.GpsInjection             # MAVLink GPS_INPUT
inject_rtcm:                            keelson.TimestampedBytes         # RTCM3 frames, fragmented if > 180 B; GPS_RTCM_DATA
inject_velocity_body_mps:               keelson.Decomposed3DVector       # body-frame velocity for VISION_SPEED_ESTIMATE
inject_external_pose:                   mavlink.ExternalPoseInjection    # VISION_POSITION_ESTIMATE
inject_external_attitude:               mavlink.ExternalAttitudeInjection # ATT_POS_MOCAP (orientation only)
inject_distance_sensor:                 mavlink.DistanceSensorInjection  # DISTANCE_SENSOR (depth sounder, LIDAR, etc.)
inject_battery_status:                  mavlink.BatteryStatusInjection   # BATTERY_STATUS from companion battery monitor
inject_system_time:                     keelson.TimestampedTimestamp     # SYSTEM_TIME, value = UTC time to push
